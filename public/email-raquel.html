<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assinatura de Email - Transuniverso</title>
</head>
<body>
  <table cellpadding="0" cellspacing="0" width="600" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial;">
    <tbody>
      <tr>
        <td>
          <table cellpadding="0" cellspacing="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial;">
            <tbody>
              <tr>
                <!-- Logo -->
                <td style="vertical-align: middle;">
                  <span style="display: block;">
                    <img src="https://www.transuniverso.com.br/logo-black.png" role="presentation" style="width: 200px;">
                  </span>
                </td>

                <!-- Espaçador -->
                <td width="30" aria-label="Vertical Spacer">
                  <div style="width: 30px;"></div>
                </td>

                <!-- Divisor Vertical -->
                <td width="2" aria-label="Divider" style="vertical-align: middle;">
                  <div style="width: 2px; height: 95px; background-color: #000000; border-radius: 999px;"></div>
                </td>

                <!-- Espaçador -->
                <td width="30" aria-label="Vertical Spacer">
                  <div style="width: 30px;"></div>
                </td>

                <!-- Informações de Contato -->
                <td style="vertical-align: middle;">
                  <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial; line-height: 1;">
                    <tbody>
                    <!-- Nome do Usuário -->
                      <tr style="vertical-align: middle; height: 28px;">
                        <td width="26" style="vertical-align: middle;">
                          <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial; width: 26px;">
                            <tbody>
                              <tr>
                                <td style="vertical-align: bottom;">
                                  <span style="display: inline-block; margin-top: 2px;">
                                    <img src="https://www.transuniverso.com.br/user-fill.svg" width="18" >
                                  </span>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </td>
                        <td style="padding: 0px; color: rgb(0, 0, 0);">
                          <span style="text-decoration: none; color: rgb(0, 0, 0); font-size: 14px; font-weight: 600;">Raquel Gonçalves</span>
                        </td>
                      </tr>

                      <!-- Telefone -->
                      <tr style="vertical-align: middle; height: 28px;">
                        <td width="26" style="vertical-align: middle;">
                          <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial; width: 26px;">
                            <tbody>
                              <tr>
                                <td style="vertical-align: bottom;">
                                  <span style="display: inline-block; margin-top: 2px; background-color: rgb(0, 0, 0);">
                                    <img src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/phone-icon-dark-2x.png" alt="mobilePhone" width="18" style="display: block; background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 0, 0));">
                                  </span>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </td>
                        <td style="padding: 0px; color: rgb(0, 0, 0);">
                          <a href="tel:(11) 98671-8881" style="text-decoration: none; color: rgb(0, 0, 0); font-size: 14px;">
                            <span>(11) 98671-8881</span>
                          </a>
                        </td>
                      </tr>

                      <!-- Email -->
                      <tr style="vertical-align: middle; height: 28px;">
                        <td width="26" style="vertical-align: middle;">
                          <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial; width: 26px;">
                            <tbody>
                              <tr>
                                <td style="vertical-align: bottom;">
                                  <span style="display: inline-block; margin-top: 2px; background-color: rgb(0, 0, 0);">
                                    <img src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/email-icon-dark-2x.png" alt="emailAddress" width="18" style="display: block; background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 0, 0));">
                                  </span>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </td>
                        <td style="padding: 0px; color: rgb(0, 0, 0);">
                          <a href="mailto:raquel@transuniverso.com.br" style="text-decoration: none; color: rgb(0, 0, 0); font-size: 14px;">
                            <span>raquel@transuniverso.com.br</span>
                          </a>
                        </td>
                      </tr>

                      <!-- Website -->
                      <tr style="vertical-align: middle; height: 28px;">
                        <td width="26" style="vertical-align: middle;">
                          <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: -webkit-baseline-middle; font-size: medium; font-family: Arial; width: 26px;">
                            <tbody>
                              <tr>
                                <td style="vertical-align: bottom;">
                                  <span style="display: inline-block; margin-top: 2px; background-color: rgb(0, 0, 0);">
                                    <img src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/link-icon-dark-2x.png" alt="website" width="18" style="display: block; background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 0, 0));">
                                  </span>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </td>
                        <td style="padding: 0px; color: rgb(0, 0, 0);">
                          <a href="https://www.transuniverso.com.br" style="text-decoration: none; color: rgb(0, 0, 0); font-size: 14px;">
                            <span>www.transuniverso.com.br</span>
                          </a>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
            </tbody>
          </table>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>
